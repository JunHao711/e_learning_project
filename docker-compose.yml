version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: elearning_redis
    ports:
      - "6379"

  backend:
    build: .
    container_name: elearning_backend
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/1

  frontend:
    build: ./e_learning_frontend
    container_name: elearning_frontend
    volumes:
      - ./e_learning_frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend